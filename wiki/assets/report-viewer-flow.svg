<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <defs>
    <style>
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 12; ry: 12; }
      .service { fill: #dbeafe; }
      .text { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 16px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .caption { font-size: 14px; fill: #475569; }
      .arrow { fill: none; stroke: #0f172a; stroke-width: 2.2; }
      .arrow-dashed { stroke-dasharray: 6 6; }
      .label { font-size: 13px; fill: #475569; text-anchor: middle; }
      .bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; rx: 24; ry: 24; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>
  <rect class="bg" x="10" y="10" width="860" height="400" />

  <!-- Nodes -->
  <rect class="node" x="50" y="170" width="150" height="70" />
  <text class="text" x="125" y="205">Login / 用户</text>

  <rect class="node" x="250" y="50" width="180" height="70" />
  <text class="text" x="340" y="85">Maker 面板</text>

  <rect class="node" x="250" y="310" width="180" height="70" />
  <text class="text" x="340" y="345">Checker 面板</text>

  <rect class="node service" x="250" y="170" width="180" height="90" />
  <text class="text" x="340" y="205">
    <tspan x="340" dy="0">ReportService</tspan>
    <tspan x="340" dy="20" class="caption">执行 / 审批 / 导出</tspan>
  </text>

  <rect class="node service" x="475" y="110" width="150" height="80" />
  <text class="text" x="550" y="150">AuthService</text>

  <rect class="node" x="660" y="170" width="170" height="90" />
  <text class="text" x="745" y="205">
    <tspan x="745" dy="0">Spring Boot API</tspan>
    <tspan x="745" dy="20" class="caption">/api/auth + /api/reports</tspan>
  </text>

  <!-- Arrows -->
  <path class="arrow" marker-end="url(#arrowhead)" d="M200 205 H250" />
  <text class="label" x="225" y="190">login()</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M430 205 H660" />
  <text class="label" x="545" y="190">execute / submit / export</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M400 205 L475 150" />
  <text class="label" x="430" y="150">加载用户</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M340 120 V170" />
  <text class="label" x="360" y="150">执行报表</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M340 310 V260" />
  <text class="label" x="360" y="290">审批 / 审计</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M550 110 V80 H125 V170" class="arrow-dashed" />
  <text class="label" x="240" y="60">session / profile</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M625 150 H660" />
  <text class="label" x="645" y="135">认证</text>

  <!-- Legend -->
  <rect class="node" x="80" y="30" width="140" height="50" />
  <text class="text" x="150" y="55">前端交互</text>
  <rect class="node service" x="80" y="90" width="140" height="50" />
  <text class="text" x="150" y="115">服务 / API</text>
</svg>
