# Test profile configuration for API tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration - use update to let Hibernate create entity tables (users, report_run, etc.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SQL initialization for static data (customers, transactions, etc.)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Logging
logging.level.com.legacy.report=INFO
logging.level.org.springframework.security=WARN

# JWT configuration (test values) - must match main app structure
security.jwt.secret=test-secret-key-for-api-testing-only-do-not-use-in-production
security.jwt.expiration=86400000
